<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Notes App with Background Colors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
    <h1>Sticky Notes 📝</h1>
    <div class="input-section">
        <textarea id="note-text" placeholder="Write something..."></textarea>
        <div class="controls">
            <input type="color" id="note-color" value="#fff9c4">
            <button id="add-btn">Pin Note</button>
        </div>
    </div>
    
    <div id="notes-grid" class="notes-grid">
        </div>
</div>
</body>
</html>
